          - name: "Bioinformatician"
            date: "Sep 2010 - Nov 2011"
            content: |
              International Institute of Tropical Agriculture, Nairobi, Kenya.

              - Developed data mining and bioinformatics workflows for genomic data analysis.
              - Managed sequence data storage and retrieval systems; created scripts to parse and process biological sequence data.

      - company: "Earlier Roles"
