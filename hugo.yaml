  # About
  about:
    enable: true
    title: "About Me"
    content: |-
      I'm a tinkerer at heart with 15+ years of building software across wildly different domains — fintech, media, agritech, DeFi, telecom, bioinformatics. I get restless if I'm not pulling apart something new.

      My projects range from DeFi bots to voice-first AI tutors built on WebRTC, from automating government tender submissions with Claude to reconciling bank settlements across 38 African countries. I run [NARS Technical Services](https://www.narstechnical.co.ke) in Nairobi, where the rule is simple: if it's an interesting problem, we build it.
    skills:
      enable: true
      title: "Technologies I work with:"
      items:
        - "Flutter / FlutterFlow"
        - "React / Next.js"
        - "FastAPI / Python"
        - "TypeScript / JavaScript"
        - "LangGraph / Mastra"
        - "Claude API / OpenAI"
        - "LiveKit (WebRTC)"
        - "Deepgram / ElevenLabs"
        - "AWS / GCP / Docker"
        - "PostgreSQL"

  # Experience
  experience:
    enable: true
    items:
      - company: "NARS Technical Services"
        companyUrl: "https://www.narstechnical.co.ke"
        jobs:
          - name: "Chief Executive Officer"
            date: "Mar 2022 - Present"
            content: |
              Building AI-powered enterprise solutions, managing telco infrastructure deployments, and leading software development in Nairobi, Kenya.

              - Managing a team providing telecom services rollout and maintenance including wireless installations, fiber optic cabling (overhead and underground), and LAN deployments for enterprise clients.
              - Built a voice-first AI learning platform using LiveKit (WebRTC), LangGraph, and Deepgram that transforms study materials into real-time voice-based quiz sessions with adaptive spaced repetition.
              - Developed a settlement reconciliation platform (FastAPI, React, LangGraph) automating extraction and aggregation of bank settlement data across hundreds of accounts in multiple African countries.
              - Created an AI-powered content management agent using Mastra and Claude to autonomously grade, optimize SEO/GEO, and curate 1,200+ blog posts.
              - Built an LPO processing and invoice generation suite (Python, pdfquery, ReportLab) that extracts financial data from Local Purchase Order PDFs and auto-generates professional invoices and reports.
              - Developed an LPO parser (Python, pdfplumber) for bulk extraction of structured data from procurement documents with multi-strategy fallback for OCR-damaged files.
              - Engineered a DeFi trading bot (Solidity, Python, Web3.py) that detects and executes arbitrage opportunities across decentralized exchanges with multicall batching and real-time monitoring.
              - Engineered a tender document automation tool (Python, PyMuPDF, Claude API) for government tender submissions.
              - Designed eTIMS integration tooling for Kenya Revenue Authority electronic tax invoice compliance.
              - Led deployment of secure, high-availability networking infrastructure for enterprise clients.

      - company: "TradePulse Inc."
        companyUrl: "#"
        jobs:
          - name: "Head of Mobile"
            date: "Jan 2024 - Jul 2025"
            content: |
              Led mobile and web platform development for agro-processing in Nairobi, Kenya.

              - Led end-to-end Flutter development of the TradePulse Mobile App, enabling agro-processors to manage inventory, create orders, accept payments, and generate reports — reducing order processing time by 40%.
              - Spearheaded React/Next.js development of the TradePulse Sourcing Platform, a CRM-driven B2B system that streamlined raw material sourcing between buyers and suppliers.
              - Collaborated with product and operations to scale the platform regionally, supporting hundreds of daily transactions.

      - company: "Radio Africa Group"
        companyUrl: "#"
        jobs:
          - name: "Team Leader, Innovation"
            date: "Sep 2018 - Apr 2022"
            content: |
              Directed agile teams building consumer digital products reaching millions of users.

              - Built a music streaming platform with real-time recommendations.
              - Developed a digital newspaper platform enabling subscriptions and seamless content delivery.
              - Created interactive games and quizzes that boosted engagement and dwell time.
              - Championed modern software practices and cloud infrastructure to accelerate development cycles.
          - name: "Software Engineer"
            date: "May 2016 - Sep 2018"
            content: "Built consumer digital products and supported digital transformation initiatives for one of East Africa's largest media groups."

      - company: "Cellulant Kenya"
        companyUrl: "#"
        jobs:
          - name: "Software Engineer"
            date: "Nov 2011 - Apr 2016"
            content: |
              Developed payment and fintech systems for enterprise and government clients in Nairobi, Kenya.

              - Developed and maintained bulk payment systems for enterprise and government clients, enabling high-volume secure transactions.
              - Built payment systems powering the Growth Enhancement Support Program (Nigeria), digitally connecting input suppliers to millions of farmers.
              - Modeled agricultural input supply chains, managed large datasets, and ensured platform resilience.

      - company: "IITA"
        companyUrl: "#"
